<div class="buttons">
  <button (click)="previous()">⬅️</button>
  <button (click)="next()">➡️</button>
</div>
<ul>
  @for (c of yugiResult()?.data; track c.id) {
    <li>
      <img [src]="c.card_images[0].image_url_small" />
    </li>
  }
</ul>
