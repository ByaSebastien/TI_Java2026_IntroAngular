<div class="products" appGsapEntrance>7

  @for (p of productsRessource.value(); track p.id) {

    <div [class.row]="true" [class.even]="$even" [class.odd]="$odd" appGsapEntrance>
      <p>{{ p.id }}</p>
      <p>{{ p.name }}</p>
      <p>{{ p.price | money | uppercase }}</p>
      <img [src]="p.image" [alt]="'image de ' + p.name" height="150">

      @if (p.liked) {
        <button (click)="toggleLike(p)">❤️</button>
      } @else {
        <button (click)="toggleLike(p)">🩶</button>
      }

<!--      @if (connectedUser()) {-->
        <button (click)="addToCart(p)">Add to cart</button>
        <button (click)="setSelectedProduct(p)">❌</button>
<!--      }-->
    </div>


  } @empty {
    <p>No products to display</p>
  }
</div>
<app-cart
  (minus)="removeQuantity($event)"
  (plus)="addQuantity($event)"
  (delete)="removeFromCart($event)"
></app-cart>

@if (selectedProduct()) {
  <app-delete-confirmation
    [productName]="selectedProduct()!.name"
    (onCancel)="cancelDeleting()"
    (onConfirm)="confirmDeleting()"
  >
    <h2>Supression d'un produit</h2>
    <ng-template #customActions>
      <button (click)="cancelDeleting()" appGsapHover>Stooooooooooooooooooop</button>
      <button (click)="confirmDeleting()" appGsapHover>Explosion!</button>
    </ng-template>
  </app-delete-confirmation>
}
